<!DOCTYPE html>
<html>
<head><title>Generar Iconos</title></head>
<body style="background:#111;color:white;font-family:sans-serif;padding:40px;">
<h1>Generador de Iconos - Finanzas Denis</h1>
<p>Haz clic en cada boton para descargar el icono correspondiente. Guardalos en la carpeta <code>icons/</code></p>
<div id="buttons" style="display:flex;flex-wrap:wrap;gap:12px;margin-top:20px;"></div>
<canvas id="canvas" style="display:none;"></canvas>

<script>
const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const container = document.getElementById('buttons');

function generateIcon(size) {
    canvas.width = size;
    canvas.height = size;

    // Background gradient
    const grad = ctx.createLinearGradient(0, 0, size, size);
    grad.addColorStop(0, '#1a1a2e');
    grad.addColorStop(1, '#16213e');
    ctx.fillStyle = grad;

    // Rounded rect
    const r = size * 0.18;
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.lineTo(size - r, 0);
    ctx.quadraticCurveTo(size, 0, size, r);
    ctx.lineTo(size, size - r);
    ctx.quadraticCurveTo(size, size, size - r, size);
    ctx.lineTo(r, size);
    ctx.quadraticCurveTo(0, size, 0, size - r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.fill();

    // Dollar sign circle
    const cx = size / 2;
    const cy = size * 0.45;
    const cr = size * 0.22;

    ctx.beginPath();
    ctx.arc(cx, cy, cr, 0, Math.PI * 2);
    ctx.fillStyle = '#4361ee';
    ctx.fill();

    // $ symbol
    ctx.fillStyle = 'white';
    ctx.font = `bold ${size * 0.28}px -apple-system, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('$', cx, cy);

    // Text "FD"
    ctx.fillStyle = '#e8e8e8';
    ctx.font = `bold ${size * 0.14}px -apple-system, sans-serif`;
    ctx.fillText('FD', cx, size * 0.78);

    // Download
    const link = document.createElement('a');
    link.download = `icon-${size}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
}

sizes.forEach(size => {
    const btn = document.createElement('button');
    btn.textContent = `icon-${size}.png`;
    btn.style.cssText = 'padding:12px 20px;background:#4361ee;color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px;';
    btn.onclick = () => generateIcon(size);
    container.appendChild(btn);
});

// Auto-generate all button
const allBtn = document.createElement('button');
allBtn.textContent = 'Descargar TODOS';
allBtn.style.cssText = 'padding:12px 20px;background:#00c897;color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:bold;';
allBtn.onclick = () => {
    sizes.forEach((size, i) => {
        setTimeout(() => generateIcon(size), i * 300);
    });
};
container.appendChild(allBtn);
</script>
</body>
</html>
